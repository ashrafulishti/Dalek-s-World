<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier Prime', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Smaller Header */
        .header { text-align: center; padding: 5px; border-bottom: 1px solid #0f0; }
        .header h1 { font-size: 18px; margin: 5px 0; }
        
        /* Refresh Bar */
        .refresh-bar { display: flex; justify-content: space-between; padding: 5px 10px; font-size: 10px; border-bottom: 1px solid #333; }
        
        /* CRITICAL: The chat container */
        .chat-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        
        .msg { border: 1px solid #0f0; padding: 8px; margin-bottom: 8px; border-radius: 4px; max-width: 80%; }
        .sent { align-self: flex-end; border-color: #0084ff; }
        .received { align-self: flex-start; }
        .username { color: #ff0000; font-weight: bold; font-size: 10px; }
        
        /* The input area is static at the bottom */
        .input-area { height: 60px; background: #000; padding: 10px; border-top: 1px solid #0f0; display: flex; box-sizing: border-box; }
        input { flex: 1; background: #000; color: #0f0; border: 1px solid #0f0; padding: 8px; }
        button { background: #0f0; color: #000; border: none; padding: 8px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>DALEKS</h1></div>
    <div class="refresh-bar">
        <a href="/"><button>🔄 REFRESH</button></a>
        <span>Page {{ page }}</span>
        <a href="{{ url_for('home', page=page + 1) }}"><button>OLDER ➡️</button></a>
    </div>

    <div class="chat-container" id="chatBox">
        {% for post in posts %}
            <div class="msg {{ 'sent' if post['username'] == session.username else 'received' }}">
                <span class="username">{{ post['username'] }}</span><br>{{ post['content'] }}
            </div>
        {% endfor %}
    </div>

    <div class="input-area">
        <form action="/post" method="POST" style="display:flex; width:100%;">
            <input name="content" placeholder="System command..." required autocomplete="off">
            <button type="submit">SEND</button>
        </form>
    </div>

    <script>
        const chatBox = document.getElementById("chatBox");
        // Jump to bottom immediately
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
