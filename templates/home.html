<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        /* Fallback to standard 100% height for older devices */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0;
            background: #000; 
            color: #0f0; 
            font-family: 'Courier Prime', monospace; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .header { text-align: center; padding: 5px; border-bottom: 1px solid #0f0; flex: 0 0 auto; }
        .header h1 { font-size: 16px; margin: 2px 0; }
        .refresh-bar { display: flex; justify-content: space-between; padding: 5px 10px; border-bottom: 1px solid #333; flex: 0 0 auto; }
        
        .chat-container { 
            flex: 1; 
            overflow-y: scroll; /* Use scroll instead of auto for older mobile support */
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            -webkit-overflow-scrolling: touch; /* Essential for smooth scrolling on iPhones */
        }
        
        .msg { padding: 10px; border-radius: 12px; max-width: 80%; font-size: 14px; position: relative; }
        .sent { align-self: flex-end; background: #0084ff; color: #000; }
        .received { align-self: flex-start; background: #0f0; color: #000; }
        .username { display: block; font-weight: bold; font-size: 10px; margin-bottom: 2px; }
        
        .input-area { 
            height: 60px; 
            background: #000; 
            padding: 10px; 
            border-top: 1px solid #0f0; 
            display: flex; 
            flex: 0 0 auto; 
            box-sizing: border-box; 
        }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 8px; }
        button { background: #0f0; color: #000; border: none; padding: 8px; margin-left: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header"><h1>DALEKS</h1></div>
    
    <div class="refresh-bar">
        <a href="/"><button>🔄</button></a>
        <span style="font-size: 12px; margin-top: 5px;">PAGE {{ page }}</span>
        <a href="{{ url_for('home', page=page + 1) }}"><button>OLDER ➡️</button></a>
    </div>

    <div class="chat-container" id="chatBox">
        {% for post in posts %}
            <div class="msg {{ 'sent' if post['username'] == session.username else 'received' }}">
                <span class="username">{{ post['username'] }}</span>
                {{ post['content'] }}
            </div>
        {% endfor %}
    </div>

    <div class="input-area">
        <form action="/post" method="POST" style="display:flex; width:100%;">
            <input name="content" placeholder="System command..." required autocomplete="off">
            <button type="submit">SEND</button>
        </form>
    </div>

    <script>
        // Force scroll to bottom immediately
        var chatBox = document.getElementById("chatBox");
        chatBox.scrollTop = chatBox.scrollHeight;
    </script>
</body>
</html>
