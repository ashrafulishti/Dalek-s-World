<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier Prime', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { text-align: center; padding: 15px; border-bottom: 1px solid #0f0; }
        .refresh-bar { display: flex; justify-content: space-between; padding: 10px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .msg { border: 1px solid #0f0; padding: 10px; margin-bottom: 10px; border-radius: 5px; max-width: 85%; }
        .sent { align-self: flex-end; border-color: #0084ff; }
        .received { align-self: flex-start; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; border-top: 1px solid #0f0; }
        input { width: 70%; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>DALEK</h1>
        <small>by ashrafulishti</small>
    </div>
    <div class="refresh-bar">
        <a href="/"><button>🔄 REFRESH</button></a>
        <span>Page {{ page }}</span>
        <a href="{{ url_for('home', page=page + 1) }}"><button>OLDER ➡️</button></a>
    </div>
    <div class="chat-container">
        {% for post in posts %}
            <div class="msg {{ 'sent' if post['username'] == session.username else 'received' }}">
                <b>{{ post['username'] }}</b><br>{{ post['content'] }}
            </div>
        {% endfor %}
    </div>
    <div class="input-area">
        <form action="/post" method="POST">
            <input name="content" placeholder="System command..." required>
            <button>SEND</button>
        </form>
    </div>
</body>
</html>
