<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; background: #333; color: #0f0; font-family: 'Courier Prime', monospace; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { text-align: center; padding: 10px; border-bottom: 2px solid #0f0; }
        .nav-bar { display: flex; justify-content: space-between; padding: 10px; background: #222; }
        
        .chat-container { flex: 1; overflow-y: scroll; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; }
        .sent { align-self: flex-end; background: #0084ff; color: #fff; }
        .received { align-self: flex-start; background: #555; color: #fff; }
        .username { font-weight: bold; color: #ff0000; font-size: 11px; }

        .input-area { height: 120px; background: #222; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        input { flex: 1; background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; }
        .btn-send { background: #0f0; color: #000; padding: 10px; font-weight: bold; border: none; }
        .btn-refresh { background: #444; color: #0f0; padding: 15px; font-weight: bold; border: 2px solid #0f0; width: 100%; }
    </style>
</head>
<body>
    <div class="header"><h1>DALEKS</h1></div>
    <div class="nav-bar">
        <a href="{{ url_for('home', page=page + 1) }}">OLDER ⬅️</a>
        <span>PAGE {{ page }}</span>
        {% if page > 1 %}<a href="{{ url_for('home', page=page - 1) }}">➡️ NEWER</a>{% endif %}
    </div>

    <div class="chat-container" id="chatBox">
        </div>

    <div class="input-area">
        <form action="/post" method="POST" style="display:flex; flex-direction:column; gap:5px;">
            <input name="content" placeholder="System command..." required>
            <button type="submit" class="btn-send">SEND</button>
        </form>
        <button class="btn-refresh" onclick="location.reload()">REFRESH</button>
    </div>

    <script>
        // Auto-refresh logic: Fetches new content every 1 second
        setInterval(function() {
            fetch(window.location.href)
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newChat = doc.getElementById('chatBox').innerHTML;
                    if(document.getElementById('chatBox').innerHTML !== newChat) {
                        document.getElementById('chatBox').innerHTML = newChat;
                    }
                });
        }, 1000);
    </script>
</body>
</html>
