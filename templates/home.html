<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 10px; }
        .chat-container { max-width: 500px; margin: auto; }
        .feed { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; }
        .sent { align-self: flex-end; background: #0084ff; color: white; }
        .received { align-self: flex-start; background: #e5e5ea; }
        input { width: 100%; padding: 12px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <a href="/"><button>🔄 Refresh Feed</button></a>
        <div class="feed">
            {% for post in posts %}
                <div class="msg {{ 'sent' if post['username'] == session.username else 'received' }}">
                    <b>{{ post['username'] }}</b><br>
                    {{ post['content'] }}
                </div>
            {% endfor %}
        </div>
        <form action="/post" method="POST">
            <input name="content" placeholder="Type..." required>
            <button>Send</button>
        </form>
        <a href="/?page={{ page + 1 }}">Older Messages</a>
    </div>
</body>
</html>
