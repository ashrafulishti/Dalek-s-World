<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALEKS — Secure Channel</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0a0c0f;
            --surface:   #0f1318;
            --surface2:  #151a21;
            --border:    rgba(255,255,255,0.06);
            --border-hi: rgba(255,255,255,0.12);
            --accent:    #00e5a0;
            --accent-dim:rgba(0,229,160,0.12);
            --accent2:   #0af;
            --text:      #c8d4e0;
            --text-dim:  #4a5568;
            --text-mid:  #7a8fa6;
            --d0: #00e5a0; --d1: #0af; --d2: #f0a; --d3: #fa0;
            --d4: #a0f;    --d5: #0fa; --d6: #f44; --d7: #4af;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            -webkit-font-smoothing: antialiased;
        }

        .shell {
            display: flex; flex-direction: column;
            height: 100dvh;
            max-width: 760px;
            margin: 0 auto;
            position: relative;
        }

        /* subtle dot grid */
        .shell::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(rgba(0,229,160,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none; z-index: 0;
        }

        /* ── TOPBAR ── */
        .topbar {
            position: relative; z-index: 10; flex-shrink: 0;
            display: flex; align-items: center; gap: 14px;
            padding: 0 18px; height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        .group-avatar {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, #001a12, #003d28);
            border: 1px solid rgba(0,229,160,0.22);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
            box-shadow: 0 0 16px rgba(0,229,160,0.08);
        }

        .group-info { flex: 1; min-width: 0; }
        .group-name {
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 16px; color: #fff; letter-spacing: 0.04em;
        }
        .group-sub {
            font-size: 10px; color: var(--text-mid);
            letter-spacing: 0.08em; display: flex;
            align-items: center; gap: 6px; margin-top: 2px;
        }

        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); box-shadow: 0 0 6px var(--accent);
            animation: breathe 2s ease-in-out infinite;
        }
        @keyframes breathe { 0%,100%{opacity:1}50%{opacity:0.25} }

        .topbar-right { display: flex; align-items: center; gap: 6px; }

        .page-pill {
            font-size: 10px; color: var(--text-mid);
            background: var(--surface2); border: 1px solid var(--border-hi);
            border-radius: 20px; padding: 3px 10px; letter-spacing: 0.06em;
        }

        .icon-btn {
            width: 34px; height: 34px; border-radius: 9px;
            background: transparent; border: 1px solid var(--border);
            color: var(--text-mid); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.15s; text-decoration: none;
            font-family: 'DM Mono', monospace;
        }
        .icon-btn:hover {
            background: var(--surface2); border-color: var(--border-hi); color: var(--text);
        }

        /* ── FEED ── */
        .feed {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 20px 16px 12px;
            display: flex; flex-direction: column; gap: 2px;
            position: relative; z-index: 1;
        }
        .feed::-webkit-scrollbar { width: 3px; }
        .feed::-webkit-scrollbar-track { background: transparent; }
        .feed::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

        .date-sep {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0 14px; color: var(--text-dim);
            font-size: 10px; letter-spacing: 0.15em;
        }
        .date-sep::before, .date-sep::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* ── MESSAGE ROWS ── */
        .msg-row {
            display: flex; align-items: flex-end; gap: 10px;
            padding: 1px 0;
            animation: fadeUp 0.2s ease-out both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(8px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .msg-row.sent { flex-direction: row-reverse; }

        /* Avatar */
        .avatar {
            width: 33px; height: 33px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 800;
            font-size: 10px; letter-spacing: 0.06em; margin-bottom: 1px;
        }
        .msg-row:not(.first-in-group) .avatar { visibility: hidden; }

        /* Bubble wrap */
        .bubble-wrap { display: flex; flex-direction: column; gap: 2px; max-width: min(72%,500px); }
        .sent .bubble-wrap { align-items: flex-end; }

        .sender-label {
            font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
            padding: 0 4px; margin-bottom: 2px;
        }
        .msg-row:not(.first-in-group) .sender-label { display: none; }

        .bubble {
            padding: 9px 14px; border-radius: 16px;
            font-size: 13.5px; line-height: 1.58; word-break: break-word;
        }

        .received .bubble {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); border-bottom-left-radius: 5px;
        }
        .sent .bubble {
            background: linear-gradient(135deg, #002e1e, #004d34);
            border: 1px solid rgba(0,229,160,0.18);
            color: #dffff4; border-bottom-right-radius: 5px;
        }

        /* Color palette per user */
        .avatar[data-c="0"]  { background:rgba(0,229,160,0.1);  color:var(--d0); border:1px solid rgba(0,229,160,0.2); }
        .avatar[data-c="1"]  { background:rgba(0,170,255,0.1);  color:var(--d1); border:1px solid rgba(0,170,255,0.2); }
        .avatar[data-c="2"]  { background:rgba(255,0,170,0.1);  color:var(--d2); border:1px solid rgba(255,0,170,0.2); }
        .avatar[data-c="3"]  { background:rgba(255,170,0,0.1);  color:var(--d3); border:1px solid rgba(255,170,0,0.2); }
        .avatar[data-c="4"]  { background:rgba(170,0,255,0.1);  color:var(--d4); border:1px solid rgba(170,0,255,0.2); }
        .avatar[data-c="5"]  { background:rgba(0,255,170,0.1);  color:var(--d5); border:1px solid rgba(0,255,170,0.2); }
        .avatar[data-c="6"]  { background:rgba(255,68,68,0.1);  color:var(--d6); border:1px solid rgba(255,68,68,0.2); }
        .avatar[data-c="7"]  { background:rgba(68,170,255,0.1); color:var(--d7); border:1px solid rgba(68,170,255,0.2); }

        .sender-label[data-c="0"] { color:var(--d0); }
        .sender-label[data-c="1"] { color:var(--d1); }
        .sender-label[data-c="2"] { color:var(--d2); }
        .sender-label[data-c="3"] { color:var(--d3); }
        .sender-label[data-c="4"] { color:var(--d4); }
        .sender-label[data-c="5"] { color:var(--d5); }
        .sender-label[data-c="6"] { color:var(--d6); }
        .sender-label[data-c="7"] { color:var(--d7); }

        /* ── COMPOSER ── */
        .composer {
            flex-shrink: 0; position: relative; z-index: 10;
            padding: 12px 14px 16px;
            background: var(--surface); border-top: 1px solid var(--border);
        }

        .composer form {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface2); border: 1px solid var(--border-hi);
            border-radius: 14px; padding: 7px 7px 7px 16px;
            transition: border-color .2s, box-shadow .2s;
        }
        .composer form:focus-within {
            border-color: rgba(0,229,160,0.28);
            box-shadow: 0 0 0 3px rgba(0,229,160,0.06);
        }

        .composer input {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'DM Mono', monospace;
            font-size: 13.5px; caret-color: var(--accent);
        }
        .composer input::placeholder { color: var(--text-dim); font-style: italic; }

        .send-btn {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--accent); border: none; color: #000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; transition: all .15s;
        }
        .send-btn:hover { background: #fff; box-shadow: 0 0 14px rgba(0,229,160,0.4); transform: scale(1.05); }
        .send-btn:active { transform: scale(.93); }

        .composer-foot {
            display: flex; justify-content: center;
            font-size: 9.5px; color: var(--text-dim);
            letter-spacing: 0.12em; margin-top: 8px; gap: 8px;
        }
        .composer-foot span { opacity: 0.5; }
    </style>
</head>
<body data-me="{{ session.username }}">
<div class="shell">

    <!-- TOPBAR -->
    <header class="topbar">
        <div class="group-avatar">◈</div>
        <div class="group-info">
            <div class="group-name">DALEKS</div>
            <div class="group-sub">
                <span class="live-dot"></span>
                <span>secure channel · encrypted</span>
            </div>
        </div>
        <div class="topbar-right">
            <span class="page-pill">pg&nbsp;{{ page }}</span>
            <a href="/" class="icon-btn" title="Refresh">↻</a>
            <a href="{{ url_for('home', page=page + 1) }}" class="icon-btn" title="Older">‹</a>
        </div>
    </header>

    <!-- FEED -->
    <main class="feed" id="chatBox">
        <div class="date-sep">daleks · secure channel</div>

        {% for post in posts %}
        <div class="msg-row {{ 'sent' if post['username'] == session.username else 'received' }} first-in-group"
             data-user="{{ post['username'] }}" data-id="{{ post['id'] }}">
            <div class="avatar" data-c="0">{{ post['username'][:2] | upper }}</div>
            <div class="bubble-wrap">
                <div class="sender-label" data-c="0">{{ post['username'] }}</div>
                <div class="bubble">{{ post['content'] }}</div>
            </div>
        </div>
        {% else %}
        <div data-placeholder style="flex:1;display:flex;align-items:center;justify-content:center;
                    flex-direction:column;gap:10px;color:#4a5568;font-size:12px;letter-spacing:.1em;">
            <div style="font-size:28px;opacity:.3">◈</div>
            <span>no transmissions yet</span>
        </div>
        {% endfor %}
    </main>

    <!-- COMPOSER -->
    <footer class="composer">
        <form action="/post" method="POST">
            <input name="content" placeholder="transmit to the collective…"
                   required autocomplete="off" maxlength="500">
            <button type="submit" class="send-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
        <div class="composer-foot">
            <span>DALEKS</span>·<span>E2E ENCRYPTED</span>·<span id="clock"></span>
        </div>
    </footer>

</div>
<script>
    // Clock
    const clockEl = document.getElementById('clock');
    function tick() {
        const d = new Date();
        clockEl.textContent = d.toISOString().replace('T',' ').slice(0,19)+' UTC';
    }
    tick(); setInterval(tick, 1000);

    // Deterministic color index from username
    function colorIdx(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
        return Math.abs(h) % 8;
    }

    // Process messages: assign colors, group consecutive same-user rows
    function processMessages(root) {
        const rows = root.querySelectorAll('.msg-row');
        let lastUser = null;
        rows.forEach(row => {
            const user = row.dataset.user || '';
            const c = colorIdx(user);
            row.querySelector('.avatar')?.setAttribute('data-c', c);
            row.querySelector('.sender-label')?.setAttribute('data-c', c);
            if (user === lastUser) {
                row.classList.remove('first-in-group');
            } else {
                row.classList.add('first-in-group');
            }
            lastUser = user;
        });
    }

    const chatBox = document.getElementById('chatBox');
    processMessages(chatBox);
    chatBox.scrollTop = chatBox.scrollHeight;

    let userScrolled = false;
    chatBox.addEventListener('scroll', () => {
        userScrolled = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight > 60;
    });

    // Track the highest post id we've seen (set from initial server-rendered messages)
    let lastId = 0;
    chatBox.querySelectorAll('.msg-row[data-id]').forEach(r => {
        const id = parseInt(r.dataset.id) || 0;
        if (id > lastId) lastId = id;
    });

    // Build a new message DOM row from a JSON message object
    const ME = document.body.dataset.me || '';
    function buildRow(msg) {
        const isSent = msg.username === ME;
        const c = colorIdx(msg.username);
        const initials = msg.username.slice(0, 2).toUpperCase();

        const row = document.createElement('div');
        row.className = 'msg-row ' + (isSent ? 'sent' : 'received') + ' first-in-group';
        row.dataset.user = msg.username;
        row.dataset.id   = msg.id;
        row.innerHTML = `
            <div class="avatar" data-c="${c}">${initials}</div>
            <div class="bubble-wrap">
                <div class="sender-label" data-c="${c}">${msg.username}</div>
                <div class="bubble">${escapeHtml(msg.content)}</div>
            </div>`;
        return row;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Poll /poll?since=N — tiny JSON response, no HTML rendering on server
    setInterval(() => {
        fetch('/poll?since=' + lastId)
            .then(r => r.json())
            .then(data => {
                if (!data.messages || data.messages.length === 0) return;

                // Remove empty-state placeholder if present
                const placeholder = chatBox.querySelector('[data-placeholder]');
                if (placeholder) placeholder.remove();

                data.messages.forEach(msg => {
                    if (msg.id > lastId) lastId = msg.id;
                    chatBox.appendChild(buildRow(msg));
                });

                processMessages(chatBox);
                if (!userScrolled) chatBox.scrollTop = chatBox.scrollHeight;
            }).catch(() => {});
    }, 2000); // 2s is plenty — reduces server load by 50% vs 1s
</script>
</body>
</html>
