<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALEKS · #{{ channel_name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier Prime', monospace;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrap {
            width: 90%;
            max-width: 360px;
            text-align: center;
        }

        .lock-icon {
            font-size: 48px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .title {
            font-size: 22px;
            letter-spacing: 0.15em;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            color: #0a0;
            letter-spacing: 0.1em;
            margin-bottom: 28px;
        }

        .channel-badge {
            display: inline-block;
            background: rgba(0,255,0,0.08);
            border: 1px solid #0a0;
            padding: 4px 14px;
            border-radius: 3px;
            font-size: 13px;
            letter-spacing: 0.12em;
            margin-bottom: 28px;
            color: #0f0;
        }

        .form-group {
            position: relative;
            margin-bottom: 14px;
        }

        .form-group input {
            width: 100%;
            background: rgba(0,255,0,0.04);
            color: #0f0;
            border: 1px solid #0a0;
            padding: 12px 14px;
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            letter-spacing: 0.08em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0,255,0,0.12);
        }
        .form-group input::placeholder { color: #0a0; }

        .btn {
            width: 100%;
            background: #0f0;
            color: #000;
            border: none;
            padding: 12px;
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            margin-top: 4px;
        }
        .btn:hover { background: #fff; box-shadow: 0 0 12px rgba(0,255,0,0.3); }

        .error {
            background: rgba(255,0,0,0.08);
            border: 1px solid #600;
            color: #f44;
            padding: 10px 14px;
            font-size: 12px;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 12px;
            color: #0a0;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.15s;
        }
        .back-link:hover { color: #0f0; }

        .divider {
            border: none;
            border-top: 1px solid #0a0;
            opacity: 0.2;
            margin: 28px 0 20px;
        }

        .other-channels-label {
            font-size: 10px;
            color: #0a0;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
        }

        .channel-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .channel-link {
            text-decoration: none;
            font-size: 12px;
            color: #0a0;
            border: 1px solid #0a0;
            padding: 4px 10px;
            border-radius: 3px;
            letter-spacing: 0.08em;
            transition: all 0.15s;
        }
        .channel-link:hover { color: #0f0; border-color: #0f0; background: rgba(0,255,0,0.06); }
        .channel-link.locked::after { content: ' 🔒'; font-size: 10px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="lock-icon">🔒</div>
    <div class="title">RESTRICTED CHANNEL</div>
    <div class="subtitle">AUTHENTICATION REQUIRED</div>
    <div class="channel-badge"># {{ channel_name }}</div>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <input type="password" name="password"
                   placeholder="ENTER CHANNEL PASSWORD"
                   autofocus required>
        </div>
        <button type="submit" class="btn">AUTHENTICATE</button>
    </form>

    <a href="{{ url_for('home') }}" class="back-link">← BACK TO GENERAL</a>

    {% if channels %}
    <hr class="divider">
    <div class="other-channels-label">OTHER CHANNELS</div>
    <div class="channel-list">
        {% for ch in channels %}
            {% if ch.name != channel_name %}
            <a href="{{ url_for('channel', channel_name=ch.name) }}"
               class="channel-link {{ 'locked' if ch.locked else '' }}">
                #{{ ch.name }}
            </a>
            {% endif %}
        {% endfor %}
    </div>
    {% endif %}
</div>
</body>
</html>
